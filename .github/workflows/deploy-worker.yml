name: Deploy Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies
        run: poetry install

      - name: Run Python tests
        run: poetry run pytest -q

      - name: Verify Worker
        run: npm run worker:verify

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Build current calendar for KV
        run: npm run worker:build-static

      - name: Refresh served calendar in KV
        run: |
          npx wrangler kv key put calendar:body --binding CALENDAR_CACHE --path cloudflare/generated/us_holidays.ics --remote
          npx wrangler kv key put calendar:generated_at --binding CALENDAR_CACHE --path cloudflare/generated/generated_at.txt --remote
