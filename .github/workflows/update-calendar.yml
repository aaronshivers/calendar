name: Update Calendar

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check formatting with black
        run: poetry run black --check .

      - name: Run linting with flake8
        run: poetry run flake8 .

      - name: Run type checking with mypy
        run: poetry run mypy .

      - name: Run tests with coverage
        run: poetry run coverage run -m pytest -q

      - name: Verify Worker parity
        run: npm run worker:verify

      - name: Generate coverage report
        run: poetry run coverage report

      - name: Check coverage threshold
        run: poetry run coverage report --fail-under=70

      - name: Smoke test calendar generation
        run: poetry run python -m generate_calendar --dry-run
